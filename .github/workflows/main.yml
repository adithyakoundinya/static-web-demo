name: Deploy Static Website

on:
  push:
    branches: [ "main" ]

# Grants the workflow permission to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # STAGE 1: Continuous Integration (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Static Site Tests
        run: npm test

  # STAGE 2: Continuous Deployment (CD)
  deploy:
    needs: test  # CD will only run if the 'test' job passes!
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/' # Deploys only the files inside src/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
